apiVersion: apps/v1
kind: Deployment
metadata:
  name: uber-app
  labels:
    app: uber-app
spec:
  replicas: 5
  selector:
    matchLabels:
      app: uber-app
  template:
    metadata:
      labels:
        app: uber-app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: uber-app
        
        image: httpd
        imagePullPolicy: "Always"
        
